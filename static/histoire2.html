<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histoire du Jour 2 — Géopolitique</title>
<style>
@font-face { font-family: 'Bebas Neue'; src: url('/static/fonts/BebasNeue.ttf') format('truetype'); }
@font-face { font-family: 'Cinzel'; src: url('/static/fonts/Cinzel-Bold.ttf') format('truetype'); font-weight: 700; }
@font-face { font-family: 'Oswald'; src: url('/static/fonts/Oswald-Bold.ttf') format('truetype'); font-weight: 700; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0a18; color: #e0e0f0; height: 100vh; display: flex; flex-direction: column; }

header { background: #12112a; border-bottom: 1px solid #1a1e3a; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
header h1 { font-size: 1.1rem; background: linear-gradient(90deg,#f97316,#ef4444,#dc2626); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hdr-status { font-size: 0.72rem; color: #6b7280; }
.hdr-status.ok { color: #10b981; }
.btn-new { padding: 7px 14px; background: linear-gradient(135deg,#b45309,#f97316); color: #fff; border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
.btn-new:hover { filter: brightness(1.15); }
.job-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #1e1e3a; font-size:0.78rem; }
.job-item:hover { background:#1a1a35; }
.job-item.active { background:#1a0e00; color:#f97316; }

.layout { display: flex; flex: 1; overflow: hidden; }
.main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.pipeline-strip { display: flex; align-items: stretch; padding: 14px 20px; gap: 0; border-bottom: 1px solid #1e1e3a; background: #0f0f22; flex-shrink: 0; overflow-x: auto; }
.node { width: 170px; background: #16162e; border: 2px solid #2a2a4a; border-radius: 10px; flex-shrink: 0; cursor: pointer; transition: all 0.2s; overflow: hidden; }
.node:hover { border-color: #7a3010; }
.node.active { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
.node.s-running { border-color: #f59e0b; box-shadow: 0 0 16px rgba(245,158,11,0.2); }
.node.s-done { border-color: #10b981; }
.node.s-error { border-color: #ef4444; }
.node-head { padding: 9px 11px 7px; background: #1a1a38; display: flex; align-items: center; gap: 8px; }
.node-icon { font-size: 1.2rem; }
.node-title { font-size: 0.78rem; font-weight: 600; }
.node-sub { font-size: 0.62rem; color: #7070a0; margin-top: 1px; }
.node-body { padding: 8px 11px; }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
.b-pending { background:#1e1e38; color:#6b7280; }
.b-running { background:#2d1f00; color:#f59e0b; }
.b-done { background:#063020; color:#10b981; }
.b-error { background:#2d0a0a; color:#ef4444; }
.arrow { width: 28px; display: flex; align-items: center; justify-content: center; color: #2a2a5a; font-size: 1.1rem; flex-shrink: 0; }
.arrow.lit { color: #10b981; }

.detail { flex: 1; overflow: hidden; }
.detail-left { width: 100%; height: 100%; overflow-y: auto; padding: 20px; }

.agent-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.agent-title { font-size: 1.1rem; font-weight: 700; }
.agent-desc { font-size: 0.78rem; color: #7070a0; margin-top: 2px; }
.actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
.btn-primary { background: linear-gradient(135deg,#b45309,#f97316); color: #fff; }
.btn-secondary { background: #1e1e38; color: #c0c0e0; border: 1px solid #2a2a4a; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-box { background: #1a0000; border: 1px solid #ef4444; border-radius: 8px; padding: 12px; font-size: 0.78rem; color: #ef4444; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.result-card { background: #0d0d20; border: 1px solid #2a2a4a; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.result-label { font-size: 0.65rem; color: #f97316; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

.event-row { background: #1a0e00; border: 1px solid #3a1a00; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.event-row-title { font-size: 0.88rem; font-weight: 700; color: #fed7aa; }
.event-row-date { font-size: 0.72rem; color: #f97316; font-weight: 600; margin-top: 3px; }
.event-row-hook { font-size: 0.80rem; color: #d0b090; margin-top: 5px; line-height: 1.5; }
.event-row-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
.score-bar { height: 5px; background: #2a1500; border-radius: 3px; margin-top: 6px; }
.score-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#b45309,#f97316); }
.country-tag { font-size: 0.62rem; padding: 2px 7px; border-radius: 20px; background: #1e1005; color: #f97316; border: 1px solid #3a1a00; }
.selected-box { background: #1a0e00; border: 2px solid #f97316; border-radius: 8px; padding: 12px; margin-top: 12px; }
</style>
</head>
<body>

<header>
  <a href="/" style="font-size:0.75rem;color:#5a5a80;text-decoration:none;border:1px solid #2a2a4a;padding:4px 10px;border-radius:6px">← Workflows</a>
  <h1>🌍 Histoire du Jour 2 — Géopolitique</h1>
  <button class="btn-new" onclick="newJob()" style="margin-left:auto">＋ Nouvelle session</button>
  <div id="sessions-btn" style="position:relative;margin-left:8px">
    <button onclick="toggleSessionsList()" style="background:#1e1e38;border:1px solid #2a2a4a;color:#c0c0e0;padding:7px 14px;border-radius:7px;font-size:0.82rem;cursor:pointer">Sessions ▾</button>
    <div id="sessions-dropdown" style="display:none;position:absolute;top:110%;right:0;background:#12112a;border:1px solid #2a2a4a;border-radius:8px;min-width:220px;z-index:100;max-height:300px;overflow-y:auto"><div id="jobs-list"></div></div>
  </div>
  <span id="hdr-status" class="hdr-status" style="margin-left:8px">API...</span>
</header>

<div class="layout">
  <div class="main-wrap">

    <div class="pipeline-strip" id="pipeline-strip">
      <div style="color:#4a4a70;font-size:0.82rem;display:flex;align-items:center">Crée ou sélectionne une session</div>
    </div>

    <div class="detail">
      <div class="detail-left" id="detail-left">
        <div style="color:#4a4a70;font-size:0.85rem;margin-top:40px;text-align:center">Sélectionne un agent dans le pipeline</div>
      </div>
    </div>

  </div>
</div>

<script>
const API = location.hostname.includes('factorytiktok') ? '' : 'http://localhost:8401';

const AGENTS = [
  { id:'topic',    icon:'🌍', title:'Topic',    sub:'Événement géopolitique', desc:'Trouve les événements guerre/attentat/scandale du jour, avec priorité USA, Israël, France, Russie. Scoring orienté indignation et débat.' },
  { id:'research', icon:'🔍', title:'Research', sub:'Fact-check + script',    desc:'Reçoit titre, description et date — enrichit avec 3 faits vérifiés, script TikTok et description TikTok.' },
  { id:'prompt',   icon:'🎬', title:'Prompt',   sub:'Runway cinématique',     desc:'Génère un prompt Runway Gen-4 pour un mini-film 10s — photorealisme, mouvement caméra narratif, ambiance cinéma.' },
  { id:'visual',   icon:'🎥', title:'Visuel',   sub:'Runway 10s 720p',        desc:'Soumet le prompt à Runway via kie.ai et génère la vidéo 10 secondes en 9:16.' },
  { id:'montage',  icon:'✂️', title:'Montage',  sub:'FFmpeg overlay',          desc:'Superpose la date et le titre overlay sur la vidéo Runway.' },
];

let currentJobId = null;
let currentAgent = null;
let pollTimer = null;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleSessionsList() {
  const d = document.getElementById('sessions-dropdown');
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', e => {
  const btn = document.getElementById('sessions-btn');
  if (btn && !btn.contains(e.target)) {
    const d = document.getElementById('sessions-dropdown');
    if (d) d.style.display = 'none';
  }
});

async function loadJobs() {
  const r = await fetch(`${API}/api/histoire2/jobs`);
  const data = await r.json();
  const list = document.getElementById('jobs-list');
  if (!data.jobs?.length) {
    list.innerHTML = '<div style="padding:16px;text-align:center;color:#3a3a60;font-size:0.75rem">Aucune session</div>';
    return;
  }
  list.innerHTML = data.jobs.map(j => {
    const dot = {idle:'⬜',running:'🟡',done:'🟢',error:'🔴'}[j.status]||'⬜';
    const d = new Date(j.created_at);
    const label = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="job-item ${j.id===currentJobId?'active':''}" onclick="selectJob('${j.id}')">
      <div>${dot} ${j.id.replace('hist2_','')}</div>
      <div style="font-size:0.65rem;color:#4a4a70;margin-top:2px">${label}</div>
    </div>`;
  }).join('');
}

async function newJob() {
  const r = await fetch(`${API}/api/histoire2/jobs`, {method:'POST'});
  const data = await r.json();
  document.getElementById('sessions-dropdown').style.display = 'none';
  await loadJobs();
  await selectJob(data.job_id);
}

async function selectJob(jobId) {
  currentJobId = jobId;
  currentAgent = 'topic';
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('sessions-dropdown').style.display = 'none';
  await loadJobs();
  const r = await fetch(`${API}/api/histoire2/jobs/${jobId}`);
  const job = await r.json();
  renderPipeline(job);
  renderDetail('topic', job);
}

function renderPipeline(job) {
  const strip = document.getElementById('pipeline-strip');
  strip.innerHTML = AGENTS.map((ag, i) => {
    const st = job.agents?.[ag.id]?.status || 'pending';
    const isActive = ag.id === currentAgent;
    const prev = i > 0 ? (job.agents?.[AGENTS[i-1].id]?.status || 'pending') : 'done';
    return `
      ${i > 0 ? `<div class="arrow ${prev==='done'?'lit':''}">›</div>` : ''}
      <div class="node ${isActive?'active':''} s-${st}" onclick="selectAgent('${ag.id}')">
        <div class="node-head">
          <span class="node-icon">${ag.icon}</span>
          <div><div class="node-title">${ag.title}</div><div class="node-sub">${ag.sub}</div></div>
        </div>
        <div class="node-body">
          <span class="badge b-${st}">${badgeLabel(st)}</span>
        </div>
      </div>`;
  }).join('');
}

function badgeLabel(st) {
  return {pending:'⏳ En attente', running:'⚡ En cours', done:'✓ Fait', error:'✗ Erreur'}[st] || st;
}

function selectAgent(agentId) {
  currentAgent = agentId;
  if (!currentJobId) return;
  fetch(`${API}/api/histoire2/jobs/${currentJobId}`).then(r=>r.json()).then(job => {
    renderPipeline(job);
    renderDetail(agentId, job);
  });
}

function renderDetail(agentId, job) {
  const ag = AGENTS.find(a => a.id === agentId);
  const state = job.agents?.[agentId] || {};
  const st = state.status || 'pending';
  const isRunning = st === 'running';
  const left = document.getElementById('detail-left');

  let actionsHtml = `<div class="actions">
    <button class="btn btn-primary" onclick="runAgent('${agentId}')" ${isRunning?'disabled':''}>
      ${isRunning?'<span class="spin">⟳</span> En cours...':'▶ Lancer'}
    </button>`;
  if (st === 'done' || st === 'error') {
    actionsHtml += `<button class="btn btn-secondary" onclick="runAgent('${agentId}')">↻ Relancer</button>`;
  }
  actionsHtml += `</div>`;

  let outputHtml = '';
  if (st === 'error' && state.error) {
    outputHtml = `<div class="error-box">${esc(state.error)}</div>`;
  } else if (st === 'done' && state.result) {
    outputHtml = renderOutput(agentId, state.result);
  }

  left.innerHTML = `
    <div class="agent-header">
      <span style="font-size:2rem">${ag.icon}</span>
      <div><div class="agent-title">${ag.title}</div><div class="agent-desc">${ag.desc}</div></div>
      <span class="badge b-${st}" style="margin-left:auto">${badgeLabel(st)}</span>
    </div>
    ${actionsHtml}
    ${outputHtml || `<div style="color:#4a4a70;font-size:0.85rem">${st==='pending'?'Lance cet agent pour voir les résultats.':''}</div>`}
  `;

  if (st === 'running' && !pollTimer) {
    pollTimer = setInterval(async () => {
      const r = await fetch(`${API}/api/histoire2/jobs/${currentJobId}`);
      const j = await r.json();
      renderPipeline(j);
      if (currentAgent) renderDetail(currentAgent, j);
      await loadJobs();
      if (j.status !== 'running') { clearInterval(pollTimer); pollTimer = null; }
    }, 3000);
  }
}

function renderOutput(agentId, result) {
  if (agentId === 'topic') {
    const events = result.events || [];
    const selected = result.selected_event || {};
    return `
      <div class="result-card">
        <div class="result-label">📅 Date analysée : ${esc(result.date_display||'')}</div>
        ${events.map(e => {
          const confirmed = e.confirmed !== false;
          const borderColor = confirmed ? '#1a3a1a' : '#3a1a1a';
          const bgColor = confirmed ? '#0e1a0e' : '#1a0e0e';
          const verifyBadge = confirmed
            ? `<span style="font-size:0.65rem;padding:2px 8px;border-radius:20px;background:#063020;color:#10b981;font-weight:600">✓ Confirmé</span>`
            : `<span style="font-size:0.65rem;padding:2px 8px;border-radius:20px;background:#2d0a0a;color:#ef4444;font-weight:600">✗ Refusé</span>`;
          return `
          <div class="event-row" style="background:${bgColor};border-color:${borderColor};${!confirmed?'opacity:0.7':''}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
              <div class="event-row-title">${esc(e.title||'')}</div>
              ${verifyBadge}
            </div>
            <div class="event-row-date">📅 ${esc(e.exact_date||String(e.year||''))}</div>
            <div class="event-row-hook">${esc(e.hook||'')}</div>
            <div class="event-row-meta">
              <span style="font-size:0.75rem;color:#f97316;font-weight:700">🔥 ${e.viral_score||0}/100</span>
              <span style="font-size:0.68rem;color:#7070a0">${esc(e.category||'')}</span>
              ${(e.countries||[]).map(c => `<span class="country-tag">${esc(c)}</span>`).join('')}
              ${confirmed ? `<button onclick="selectEvent(${JSON.stringify(e).replace(/"/g,'&quot;')})" style="margin-left:auto;padding:3px 10px;background:#1a2a1a;border:1px solid #2a5a2a;color:#10b981;border-radius:6px;font-size:0.65rem;cursor:pointer;font-weight:600">✓ Choisir</button>` : ''}
            </div>
            ${e.verify_reason ? `<div style="margin-top:6px;font-size:0.68rem;color:${confirmed?'#4a7a4a':'#7a4a4a'};font-style:italic">💬 ${esc(e.verify_reason)}</div>` : ''}
            <div class="score-bar"><div class="score-fill" style="width:${e.viral_score||0}%;background:${confirmed?'linear-gradient(90deg,#b45309,#f97316)':'#5a3030'}"></div></div>
          </div>`;
        }).join('')}
        <div class="selected-box">
          <div style="font-size:0.62rem;color:#f97316;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">✓ Sélectionné — transmis à Research</div>
          <div style="font-size:0.72rem;color:#f97316;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">TITRE</div>
          <div style="font-size:1rem;font-weight:700;color:#fed7aa;margin-bottom:8px">${esc(result.titre||selected.title||'')}</div>
          <div style="font-size:0.72rem;color:#f97316;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">DATE</div>
          <div style="font-size:0.82rem;color:#fb923c;font-weight:600;margin-bottom:8px">${esc(result.date||selected.exact_date||'')}</div>
          <div style="font-size:0.72rem;color:#f97316;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">DESCRIPTION</div>
          <div style="font-size:0.82rem;color:#d0b090;line-height:1.6">${esc(result.description||selected.hook||'')}</div>
        </div>
      </div>
      ${(result.prompt_search || result.prompt_verify) ? `
      <div class="result-card" style="margin-top:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div class="result-label" style="margin-bottom:0">🔍 Prompts utilisés</div>
          <span style="font-size:0.72rem;color:#5a5a80">▾ afficher</span>
        </div>
        <div style="display:none;margin-top:12px">
          ${result.prompt_search ? `
          <div style="margin-bottom:12px">
            <div style="font-size:0.62rem;color:#f97316;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Prompt 1 — Recherche</div>
            <pre style="font-size:0.70rem;color:#a0b0c0;white-space:pre-wrap;background:#080818;padding:10px;border-radius:6px;border:1px solid #1a1a3a;line-height:1.6;overflow-x:auto">${esc(result.prompt_search)}</pre>
          </div>` : ''}
          ${result.prompt_verify ? `
          <div>
            <div style="font-size:0.62rem;color:#f97316;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Prompt 2 — Vérification</div>
            <pre style="font-size:0.70rem;color:#a0b0c0;white-space:pre-wrap;background:#080818;padding:10px;border-radius:6px;border:1px solid #1a1a3a;line-height:1.6;overflow-x:auto">${esc(result.prompt_verify)}</pre>
          </div>` : ''}
        </div>
      </div>` : ''}`;
  }
  if (agentId === 'research') {
    return `
      <div class="result-card">
        <div class="result-label">Événement</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:10px"><span style="font-size:0.62rem;color:#f97316;min-width:80px;padding-top:2px">TITRE</span><span style="font-size:0.9rem;color:#fed7aa;font-weight:700">${esc(result.titre||'')}</span></div>
          <div style="display:flex;gap:10px"><span style="font-size:0.62rem;color:#f97316;min-width:80px;padding-top:2px">DATE</span><span style="font-size:0.85rem;color:#fb923c;font-weight:600">${esc(result.date||'')}</span></div>
          <div style="display:flex;gap:10px"><span style="font-size:0.62rem;color:#f97316;min-width:80px;padding-top:2px">DESCRIPTION</span><span style="font-size:0.82rem;color:#d0b090;line-height:1.5">${esc(result.description||'')}</span></div>
        </div>
      </div>
      <div class="result-card">
        <div class="result-label">3 Faits vérifiés</div>
        <ul style="list-style:none;padding:0">
          ${(result.facts||[]).map(f => `<li style="padding:6px 0;border-bottom:1px solid #1a1a3a;font-size:0.82rem;color:#d0c0c0"><span style="color:#f97316">▸ </span>${esc(f)}</li>`).join('')}
        </ul>
      </div>
      <div class="result-card">
        <div class="result-label">Script TikTok (voix off)</div>
        <div style="background:#1a0e00;border:1px solid #3a1a00;border-radius:8px;padding:12px">
          <div style="font-size:0.62rem;color:#f97316;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Hook</div>
          <div style="font-size:1.05rem;font-weight:700;color:#fed7aa;margin-bottom:10px">${esc(result.tiktok_hook||'')}</div>
          <div style="font-size:0.62rem;color:#f97316;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Corps</div>
          <div style="font-size:0.82rem;color:#d0b090;line-height:1.6;margin-bottom:10px">${esc(result.tiktok_body||'')}</div>
          <div style="font-size:0.62rem;color:#f97316;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Punchline</div>
          <div style="font-size:0.85rem;font-style:italic;color:#fb923c">${esc(result.tiktok_punchline||'')}</div>
        </div>
      </div>
      <div class="result-card">
        <div class="result-label">Overlay vidéo</div>
        <div style="background:#0a0a1a;border:2px solid #f97316;border-radius:8px;padding:16px;text-align:center">
          ${result.overlay_titre
            ? `<div style="font-size:1.4rem;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.3">${esc(result.overlay_titre)}</div>`
            : `<div style="font-size:0.78rem;color:#5a5a80;font-style:italic">Relance Research pour générer le titre</div>`
          }
        </div>
      </div>
      <div class="result-card">
        <div class="result-label">Description TikTok</div>
        <div style="font-size:0.82rem;color:#d0c0c0;line-height:1.6;white-space:pre-line">${esc(result.description_tiktok||'')}</div>
        <div style="margin-top:8px;font-size:0.75rem;color:#7070a0">${esc(result.hashtags||'')}</div>
      </div>
      ${result.prompt_used ? `
      <div class="result-card">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div class="result-label" style="margin-bottom:0">🔍 Prompt utilisé</div>
          <span style="font-size:0.72rem;color:#5a5a80">▾ afficher</span>
        </div>
        <div style="display:none;margin-top:12px">
          <pre style="font-size:0.70rem;color:#a0b0c0;white-space:pre-wrap;background:#080818;padding:10px;border-radius:6px;border:1px solid #1a1a3a;line-height:1.6;overflow-x:auto">${esc(result.prompt_used)}</pre>
        </div>
      </div>` : ''}`;
  }
  if (agentId === 'prompt') {
    return `
      <div class="result-card">
        <div class="result-label">🎬 Prompt Runway (mini-film 10s)</div>
        <pre style="font-size:0.78rem;color:#c8e0ff;white-space:pre-wrap;background:#080818;padding:12px;border-radius:6px;border:1px solid #1a1a3a;line-height:1.7">${esc(result.runway_prompt||'')}</pre>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          ${result.camera_movement ? `<div><span style="font-size:0.62rem;color:#f97316;text-transform:uppercase">Caméra</span><div style="font-size:0.78rem;color:#fed7aa;margin-top:2px">${esc(result.camera_movement)}</div></div>` : ''}
          ${result.mood ? `<div><span style="font-size:0.62rem;color:#f97316;text-transform:uppercase">Ambiance</span><div style="font-size:0.78rem;color:#fb923c;margin-top:2px">${esc(result.mood)}</div></div>` : ''}
        </div>
        ${result.visual_rationale ? `<div style="margin-top:10px;font-size:0.72rem;color:#7070a0;font-style:italic;border-top:1px solid #1a1a3a;padding-top:8px">💡 ${esc(result.visual_rationale)}</div>` : ''}
      </div>
      ${result.prompt_used ? `
      <div class="result-card">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div class="result-label" style="margin-bottom:0">🔍 Prompt utilisé</div>
          <span style="font-size:0.72rem;color:#5a5a80">▾ afficher</span>
        </div>
        <div style="display:none;margin-top:12px">
          <pre style="font-size:0.70rem;color:#a0b0c0;white-space:pre-wrap;background:#080818;padding:10px;border-radius:6px;border:1px solid #1a1a3a;line-height:1.6">${esc(result.prompt_used)}</pre>
        </div>
      </div>` : ''}`;
  }

  if (agentId === 'montage') {
    const ts = Date.now();
    return `
      <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
        <div class="result-card" style="flex:1;min-width:260px;max-width:300px">
          <div class="result-label">Vidéo finale (FFmpeg)</div>
          <div style="text-align:center">
            <video src="${API}${esc(result.final_url||'')}${result.final_url&&result.final_url.includes('?')?'&':'?'}cb=${ts}" controls loop autoplay muted playsinline style="width:240px;aspect-ratio:9/16;object-fit:cover;border:2px solid #f97316;border-radius:8px"></video>
            <div style="margin-top:10px">
              <a href="${API}${esc(result.final_url||'')}" download style="display:inline-block;padding:8px 20px;background:#f97316;color:#fff;border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none">⬇ Télécharger</a>
            </div>
          </div>
        </div>
        <div class="result-card" style="flex:1;min-width:260px;max-width:300px">
          <div class="result-label">Preview CSS (comparaison)</div>
          <div style="position:relative;width:240px;margin:0 auto;aspect-ratio:9/16;background:#000;border-radius:8px;overflow:hidden;border:2px solid #2a2a4a">
            <video src="${API}${esc(result.raw_video_url||'')}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover"></video>
            <div style="position:absolute;top:13%;left:6%;font-family:'Cinzel',serif;font-size:0.75rem;color:#F0E8D8;text-shadow:1px 1px 3px rgba(0,0,0,0.9);letter-spacing:1px">${esc(result.overlay_date||'')}</div>
            <div style="position:absolute;bottom:22%;left:6%;right:6%;font-family:'Oswald',Impact,'Arial Black',sans-serif;font-size:1.2rem;color:#fff;text-shadow:2px 2px 6px rgba(0,0,0,0.95);line-height:1.2;font-weight:700">${esc(result.overlay_titre||'')}</div>
          </div>
        </div>
      </div>`;
  }

  if (agentId === 'visual') {
    return `
      <div class="result-card">
        <div class="result-label">🎬 Prompt utilisé</div>
        <pre style="font-size:0.72rem;color:#c8e0ff;white-space:pre-wrap;background:#080818;padding:10px;border-radius:6px;border:1px solid #1a1a3a;line-height:1.6">${esc(result.runway_prompt_used||'')}</pre>
      </div>
      <div class="result-card">
        <div class="result-label">Vidéo Runway brute — ${result.duration||10}s</div>
        <div style="text-align:center">
          <video src="${API}${esc(result.video_url||'')}" controls autoplay muted playsinline style="width:100%;max-width:240px;border:2px solid #f97316;border-radius:4px"></video>
          <br><a href="${API}${esc(result.video_url||'')}" download style="display:inline-block;margin-top:10px;padding:8px 20px;background:#f97316;color:#fff;border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none">⬇ Télécharger</a>
        </div>
      </div>`;
  }

  return `<pre style="font-size:0.72rem;color:#7070a0;white-space:pre-wrap">${esc(JSON.stringify(result,null,2))}</pre>`;
}

async function selectEvent(event) {
  if (!currentJobId) return;
  const r = await fetch(`${API}/api/histoire2/jobs/${currentJobId}/select-event`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({event}),
  });
  const data = await r.json();
  if (data.ok) {
    const jr = await fetch(`${API}/api/histoire2/jobs/${currentJobId}`);
    const job = await jr.json();
    renderPipeline(job);
    renderDetail('topic', job);
  }
}

async function runAgent(agentId) {
  if (!currentJobId) return;
  await fetch(`${API}/api/histoire2/jobs/${currentJobId}/run/${agentId}`, {method:'POST'});
  // Petit délai pour laisser le backend passer en "running"
  await new Promise(r => setTimeout(r, 500));
  const r = await fetch(`${API}/api/histoire2/jobs/${currentJobId}`);
  const job = await r.json();
  currentAgent = agentId;
  renderPipeline(job);
  renderDetail(agentId, job);
  // Force le poll même si le fetch a attrapé un état transitoire
  if (!pollTimer) {
    pollTimer = setInterval(async () => {
      const r2 = await fetch(`${API}/api/histoire2/jobs/${currentJobId}`);
      const j = await r2.json();
      renderPipeline(j);
      if (currentAgent) renderDetail(currentAgent, j);
      await loadJobs();
      const agSt = j.agents?.[currentAgent]?.status;
      if (agSt === 'done' || agSt === 'error') { clearInterval(pollTimer); pollTimer = null; }
    }, 3000);
  }
}

// Init
(async () => {
  try {
    const r = await fetch(`${API}/api/ping`);
    const d = await r.json();
    const el = document.getElementById('hdr-status');
    el.textContent = d.status === 'ok' ? '● API OK' : '⚠ API';
    el.className = 'hdr-status' + (d.status === 'ok' ? ' ok' : '');
  } catch(e) {
    document.getElementById('hdr-status').textContent = '✗ API hors ligne';
  }
  await loadJobs();
})();
</script>
