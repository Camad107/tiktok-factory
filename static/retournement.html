<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retournement Tarot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0a18; color: #e0e0f0; height: 100vh; display: flex; flex-direction: column; }

header { background: #12112a; border-bottom: 1px solid #2a1a4e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 1.1rem; background: linear-gradient(90deg,#c084fc,#a855f7,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hdr-status { font-size: 0.72rem; color: #6b7280; margin-left: auto; }
.hdr-status.ok { color: #10b981; }

.layout { display: flex; flex: 1; overflow: hidden; }
.btn-new { padding: 7px 14px; background: linear-gradient(135deg,#a855f7,#7c3aed); color: #fff; border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
.btn-new:hover { filter: brightness(1.15); }
.job-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #1e1e3a; font-size:0.78rem; }
.job-item:hover { background:#1a1a35; }
.job-item.active { background:#1e1040; color:#c084fc; }
.s-idle { color: #6b7280; } .s-running { color: #a855f7; } .s-done { color: #10b981; } .s-error { color: #ef4444; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.pipeline-strip { display: flex; align-items: stretch; padding: 16px 20px; gap: 0; border-bottom: 1px solid #1e1e3a; background: #0f0f22; flex-shrink: 0; overflow-x: auto; }
.node { width: 170px; background: #16162e; border: 2px solid #2a2a4a; border-radius: 10px; flex-shrink: 0; cursor: pointer; transition: all 0.2s; overflow: hidden; }
.node:hover { border-color: #6a4a9a; }
.node.active { border-color: #c084fc; box-shadow: 0 0 0 3px rgba(192,132,252,0.15); }
.node.s-running { border-color: #a855f7; box-shadow: 0 0 16px rgba(168,85,247,0.2); }
.node.s-done { border-color: #10b981; }
.node.s-error { border-color: #ef4444; }
.node-head { padding: 9px 11px 7px; background: #1a1a38; display: flex; align-items: center; gap: 8px; }
.node-icon { font-size: 1.2rem; }
.node-title { font-size: 0.78rem; font-weight: 600; }
.node-sub { font-size: 0.62rem; color: #7070a0; margin-top: 1px; }
.node-body { padding: 8px 11px; }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
.b-pending { background:#1e1e38; color:#6b7280; }
.b-running { background:#2d0050; color:#a855f7; }
.b-done { background:#063020; color:#10b981; }
.b-error { background:#2d0a0a; color:#ef4444; }
.node-preview { font-size: 0.65rem; color: #7070a0; margin-top: 6px; line-height: 1.4; max-height: 40px; overflow: hidden; }
.arrow { width: 28px; display: flex; align-items: center; justify-content: center; color: #2a2a5a; font-size: 1.1rem; flex-shrink: 0; }
.arrow.lit { color: #a855f7; }

.detail { flex: 1; overflow: hidden; display: flex; }
.detail-left { flex: 1; overflow-y: auto; padding: 20px; }

/* Drawer settings */
.drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; }
.drawer-overlay.open { display:block; }
.drawer { position:fixed; bottom:0; left:0; right:0; background:#12112a; border-top:2px solid #a855f7; border-radius:16px 16px 0 0; z-index:201; transform:translateY(100%); transition:transform 0.3s ease; max-height:80vh; display:flex; flex-direction:column; }
.drawer.open { transform:translateY(0); }
.drawer-header { padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1e1e3a; flex-shrink:0; }
.drawer-title { font-size:0.85rem; font-weight:600; color:#c084fc; }
.drawer-close { background:none; border:none; color:#6b7280; font-size:1.4rem; cursor:pointer; padding:0 4px; }
.drawer-close:hover { color:#e0e0f0; }
.drawer-body { overflow-y:auto; padding:16px 20px 24px; }

.agent-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.agent-title { font-size: 1.1rem; font-weight: 700; }
.agent-desc { font-size: 0.8rem; color: #7070a0; margin-top: 2px; }
.actions { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.btn { padding: 8px 16px; border-radius: 7px; border: none; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #7c3aed; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #6d28d9; }
.btn-secondary { background: #1e1e38; color: #c0c0e0; border: 1px solid #2a2a4a; }
.btn-secondary:hover:not(:disabled) { background: #2a2a4a; }

.param-group { margin-bottom: 14px; }
.param-label { font-size: 0.72rem; color: #9090b0; margin-bottom: 5px; }
.param-input { width: 100%; background: #0d0d20; border: 1px solid #2a2a4a; border-radius: 6px; color: #d0d0f0; font-size: 0.82rem; padding: 8px 10px; outline: none; }
.param-input:focus { border-color: #a855f7; }
.param-input[type=password] { letter-spacing: 2px; }

.error-box { background: #1a0505; border: 1px solid #7f1d1d; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.7rem; color: #fca5a5; white-space: pre-wrap; overflow-x: auto; max-height: 300px; overflow-y: auto; }
.empty { text-align: center; padding: 60px 20px; color: #3a3a60; }
.spin { display: inline-block; width: 10px; height: 10px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Lightbox */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; align-items:center; justify-content:center; cursor:zoom-out; }
.lightbox.open { display:flex; }
.lightbox img { max-height:92vh; max-width:50vw; border-radius:10px; }
.lightbox-close { position:absolute; top:16px; right:20px; font-size:1.8rem; color:#fff; cursor:pointer; opacity:0.7; }

/* Cards grid */
.cards-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.card-box { background: #0d0d20; border: 1px solid #2a2a4a; border-radius: 10px; padding: 14px; }
.card-num { font-size: 0.65rem; color: #7070a0; margin-bottom: 4px; }
.card-name { font-size: 0.88rem; font-weight: 700; color: #c084fc; margin-bottom: 4px; }
.card-position { font-size: 0.68rem; color: #a855f7; margin-bottom: 6px; }
.card-sens { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.63rem; margin-bottom: 6px; }
.sens-endroit { background: #063020; color: #10b981; }
.sens-inverse { background: #2d1a00; color: #f59e0b; }
.card-energie { font-size: 0.72rem; color: #e0d0ff; margin-bottom: 6px; font-style: italic; }
.card-narration { font-size: 0.72rem; color: #9090b0; line-height: 1.5; margin-top: 6px; border-top: 1px solid #1e1e3a; padding-top: 6px; }

/* Images reveal */
.images-reveal { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.img-box { border-radius: 8px; overflow: hidden; background: #0d0d20; border: 1px solid #2a2a4a; cursor: zoom-in; }
.img-box img { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; transition: transform 0.2s; }
.img-box:hover img { transform: scale(1.03); }
.img-label { font-size: 0.65rem; color: #6b7280; padding: 4px 8px; text-align: center; }

/* Upload zone */
.upload-zone { border: 2px dashed #3a2a6a; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 14px; }
.upload-zone:hover { border-color: #a855f7; }
.upload-zone input { display: none; }
.sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
.source-thumb { position: relative; }
.source-delete { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.7); border: none; color: #f87171; font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
.source-delete:hover { background: #7f1d1d; color: #fff; }
.source-thumb { border-radius: 6px; overflow: hidden; border: 1px solid #2a2a4a; }
.source-thumb img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
.source-name { font-size: 0.55rem; color: #5a5a80; padding: 2px 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightbox-img" src="">
</div>

<header>
  <a href="javascript:void(0)" onclick="goHome()" style="font-size:0.75rem;color:#5a5a80;text-decoration:none;border:1px solid #2a2a4a;padding:4px 10px;border-radius:6px">← Workflows</a>
  <h1>🃏 Retournement Tarot</h1>
  <button class="btn-new" onclick="newJob()" style="margin-left:auto">＋ Nouvelle session</button>
  <div id="sessions-btn" style="position:relative;margin-left:8px">
    <button onclick="toggleSessionsList()" style="background:#1e1e38;border:1px solid #2a2a4a;color:#c0c0e0;padding:7px 14px;border-radius:7px;font-size:0.82rem;cursor:pointer">Sessions ▾</button>
    <div id="sessions-dropdown" style="display:none;position:absolute;top:110%;right:0;background:#12112a;border:1px solid #2a2a4a;border-radius:8px;min-width:220px;z-index:100;max-height:300px;overflow-y:auto"><div id="jobs-list"></div></div>
  </div>
  <button onclick="openSettings()" style="background:#1e1e38;border:1px solid #2a2a4a;color:#c0c0e0;padding:7px 14px;border-radius:7px;font-size:0.82rem;cursor:pointer;margin-left:8px">⚙ Réglages</button>
  <span id="hdr-status" class="hdr-status" style="margin-left:8px">API...</span>
</header>

<div class="layout">
  <div class="main">
    <div class="pipeline-strip" id="pipeline-strip">
      <div style="color:#3a3a60;font-size:0.8rem;padding:20px">Chargement...</div>
    </div>
    <div class="detail">
      <div class="detail-left" id="detail-left"><div class="empty">🃏 Sélectionne un agent</div></div>
    </div>
  </div>
</div>

<!-- Drawer settings -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">⚙ Réglages</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
const API = location.hostname.includes('factorytiktok') ? '' : (location.pathname.match(/^(\/tiktok)/) || ['',''])[1];
const BASE = `${API}/api/retournement`;

const AGENTS = [
  { id:'content',  icon:'🔮', title:'Contenu',    sub:'3 arcanes + narration', desc:'Tire 3 arcanes majeurs et génère la narration complète pour la voix.' },
  { id:'prompts',  icon:'✍️', title:'Prompts',    sub:'3 prompts Seedream',    desc:'Génère les 3 prompts détaillés pour Seedream : quelle carte se retourne, son style visuel, et les cartes déjà révélées.' },
  { id:'flux', icon:'🃏', title:'Flux Kontext', sub:'3 reveals en chaîne', desc:'Génère 3 images progressives via Flux Kontext Pro : une carte révélée à la fois.' },
  { id:'voice',    icon:'🎙', title:'Voix',       sub:'ElevenLabs TTS',        desc:'Génère la narration audio MP3 via ElevenLabs.' },
  { id:'video',    icon:'🎬', title:'Vidéo',      sub:'Slideshow ffmpeg',      desc:'Monte les 4 images + audio en une vidéo MP4 9:16.' },
  { id:'publish',  icon:'📲', title:'Publication', sub:'Description + inbox',   desc:'Génère le titre/hashtags et envoie dans l\'inbox TikTok.' },
];

let currentJobId = null;
let currentAgent = null;
let pollTimer = null;

async function init() {
  await checkApi();
  setInterval(checkApi, 30000);
  const r = await fetch(`${BASE}/jobs`);
  const d = await r.json();
  if (d.jobs && d.jobs.length > 0) {
    await selectJob(d.jobs[0].id);
  } else {
    await newJob();
  }
}

async function checkApi() {
  try {
    const r = await fetch(`${API}/api/ping`);
    const d = await r.json();
    const el = document.getElementById('hdr-status');
    el.textContent = `API OK`;
    el.className = 'hdr-status ok';
  } catch {
    document.getElementById('hdr-status').textContent = 'API hors ligne';
  }
}

async function newJob() {
  const r = await fetch(`${BASE}/jobs`, { method:'POST' });
  const d = await r.json();
  await selectJob(d.job_id);
}

function goHome() {
  location.href = location.hostname.includes('factorytiktok') ? '/' : '/tiktok/';
}

function toggleSessionsList() {
  const d = document.getElementById('sessions-dropdown');
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', e => {
  const btn = document.getElementById('sessions-btn');
  if (btn && !btn.contains(e.target)) {
    const d = document.getElementById('sessions-dropdown');
    if (d) d.style.display = 'none';
  }
});

async function loadJobs() {
  const r = await fetch(`${BASE}/jobs`);
  const d = await r.json();
  const list = document.getElementById('jobs-list');
  if (!d.jobs || !d.jobs.length) {
    list.innerHTML = '<div style="padding:16px;text-align:center;color:#3a3a60;font-size:0.75rem">Aucune session</div>';
    return;
  }
  list.innerHTML = d.jobs.map(j => `
    <div class="job-item ${j.id===currentJobId?'active':''}" onclick="selectJob('${j.id}')">
      <div style="font-size:0.72rem;color:#8080a0">${j.id.replace('ret_','')}</div>
      <div class="s-${j.status}" style="font-size:0.68rem">${statusLabel(j.status)}</div>
    </div>`).join('');
}

function statusLabel(s) {
  return {idle:'⏸ Prêt',running:'⟳ En cours',done:'✓ Terminé',error:'✗ Erreur',pending:'…'}[s]||s;
}

async function selectJob(jobId) {
  currentJobId = jobId;
  currentAgent = 'content';
  await loadJobs();
  await refreshAndRender();
  startPoll();
}

function renderPipeline(job) {
  const strip = document.getElementById('pipeline-strip');
  if (!job) { strip.innerHTML = ''; return; }
  let html = '';
  AGENTS.forEach((ag, i) => {
    const state = job.agents[ag.id] || {};
    const st = state.status || 'pending';
    const preview = getPreview(ag.id, state.result);
    html += `
      <div class="node ${st!=='pending'?'s-'+st:''} ${currentAgent===ag.id?'active':''}" onclick="selectAgent('${ag.id}')">
        <div class="node-head"><span class="node-icon">${ag.icon}</span>
          <div><div class="node-title">${ag.title}</div><div class="node-sub">${ag.sub}</div></div>
        </div>
        <div class="node-body">
          <span class="badge b-${st}">${badgeHtml(st)}</span>
          ${preview?`<div class="node-preview">${preview}</div>`:''}
        </div>
      </div>
      ${i<AGENTS.length-1?`<div class="arrow ${st==='done'?'lit':''}">→</div>`:''}`;
  });
  strip.innerHTML = html;
}

function badgeHtml(st) {
  if (st==='running') return '<span class="spin"></span> En cours';
  return {pending:'⏳ En attente',done:'✓ Fait',error:'✗ Erreur'}[st]||st;
}

function getPreview(id, result) {
  if (!result) return '';
  if (id==='content') return `<strong>${esc(result.hook||'')}</strong>`;
  if (id==='prompts') return result.prompt_A ? esc(result.prompt_A.substring(0,60))+'…' : '';
  if (id==='flux') return result.image_C_path ? '4 images générées' : '';
  if (id==='voice') return result.audio_duration ? `${Math.round(result.audio_duration)}s audio` : '';
  if (id==='video') return result.video_path ? '✓ Vidéo prête' : '';
  if (id==='publish') return result.publish?.status==='sent_to_inbox' ? '✓ Envoyé en inbox' : (result.title||'');
  return '';
}

async function selectAgent(agentId) {
  currentAgent = agentId;
  if (!currentJobId) return;
  const job = await fetchJob(currentJobId);
  renderPipeline(job);
  renderDetail(agentId, job);
}

function renderDetail(agentId, job) {
  const ag = AGENTS.find(a => a.id === agentId);
  const state = job.agents[agentId] || {};
  const st = state.status || 'pending';
  const isRunning = st === 'running';
  const left = document.getElementById('detail-left');

  const launchFn = agentId === 'flux' ? 'runSeedreamChain()' : `runAgent('${agentId}')`;
  let actionsHtml = `<div class="actions">
    <button class="btn btn-primary" onclick="${launchFn}" ${isRunning?'disabled':''}>
      ${isRunning?'<span class="spin"></span>':'▶'} Lancer
    </button>`;
  if (agentId === 'content') {
    actionsHtml += `<button class="btn btn-secondary" onclick="runAll()" ${isRunning?'disabled':''}>▶▶ Tout lancer</button>`;
  }
  if (agentId === 'flux') {
    actionsHtml += `
      <button class="btn btn-secondary" onclick="runSeedreamStep('A')" ${isRunning?'disabled':''} title="Générer image A seulement (carte gauche)">▶ A</button>
      <button class="btn btn-secondary" onclick="runSeedreamStep('B')" ${isRunning?'disabled':''} title="Générer image B seulement (carte centre)">▶ B</button>
      <button class="btn btn-secondary" onclick="runSeedreamStep('C')" ${isRunning?'disabled':''} title="Générer image C seulement (carte droite)">▶ C</button>`;
  }
  if (agentId === 'voice') {
    actionsHtml += `<button class="btn btn-secondary" onclick="runAgent('voice', {preview:true})" ${isRunning?'disabled':''} title="Générer seulement la première phrase pour tester la voix">🔊 Tester</button>`;
  }
  if (st==='done'||st==='error') {
    actionsHtml += `<button class="btn btn-secondary" onclick="runAgent('${agentId}')">↻ Relancer</button>`;
  }
  actionsHtml += `</div>`;

  let outputHtml = '';
  if (st==='error' && state.error) {
    outputHtml = `<div class="error-box">${esc(state.error)}</div>`;
  } else if (st==='done' && state.result) {
    outputHtml = renderOutput(agentId, state.result, job);
  }

  left.innerHTML = `
    <div class="agent-header">
      <span style="font-size:2rem">${ag.icon}</span>
      <div><div class="agent-title">${ag.title}</div><div class="agent-desc">${ag.desc}</div></div>
      <span class="badge b-${st}" style="margin-left:auto">${badgeHtml(st)}</span>
    </div>
    ${actionsHtml}
    ${outputHtml||`<div style="color:#4a4a70;font-size:0.85rem">${st==='pending'?'Lance cet agent pour voir les résultats.':''}</div>`}`;
}

function renderOutput(agentId, result, job) {
  if (agentId === 'content') {
    const cartes = result.cartes || [];
    let h = `
      <div style="background:#1a0030;border:1px solid #6d28d9;border-radius:8px;padding:14px;font-size:1rem;font-weight:700;color:#c084fc;margin-bottom:14px;text-align:center">
        🔮 ${esc(result.hook||'')}
      </div>
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:0.75rem;color:#7070a0">
        Sujet : <strong style="color:#a855f7">${esc(result._sujet||'')}</strong>
      </div>
      <div class="cards-grid">`;
    cartes.forEach((c, i) => {
      const sensClass = c.sens === 'endroit' ? 'sens-endroit' : 'sens-inverse';
      const sensLabel = c.sens === 'endroit' ? '⬆ Endroit' : '⬇ Inversé';
      h += `<div class="card-box">
        <div class="card-num">Arcane ${c.id}</div>
        <div class="card-name">${esc(c.nom||'')}</div>
        <div class="card-position">📍 ${esc(c.position||'')}</div>
        <span class="card-sens ${sensClass}">${sensLabel}</span>
        <div class="card-energie">⚡ ${esc(c.energie||'')}</div>
        <div class="card-narration">
          <div style="color:#c084fc;font-size:0.68rem;margin-bottom:3px">Révélation :</div>
          <div>${esc(c.narration_reveal||'')}</div>
          <div style="margin-top:5px;color:#7070a0">${esc(c.narration_detail||'')}</div>
        </div>
      </div>`;
    });
    h += `</div>`;
    if (result.script_complet) {
      h += `<div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:8px;padding:12px 14px;margin-top:8px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Script voix complet</div>
        <div style="font-size:0.78rem;color:#c0c0d0;line-height:1.7;font-style:italic">${esc(result.script_complet)}</div>
      </div>`;
    }
    return h;
  }

  if (agentId === 'prompts') {
    const prompts = [
      { label: 'Prompt A — Carte gauche révélée', key: 'prompt_A', color: '#7c3aed' },
      { label: 'Prompt B — Carte centre révélée', key: 'prompt_B', color: '#a855f7' },
      { label: 'Prompt C — Toutes révélées',      key: 'prompt_C', color: '#c084fc' },
    ];
    let h = '';
    if (result.card_style) {
      h += `<div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;margin-bottom:14px">
        <div style="font-size:0.65rem;color:#6060a0;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Style visuel des cartes</div>
        <div style="font-size:0.75rem;color:#9090c0;font-style:italic">${esc(result.card_style)}</div>
      </div>`;
    }
    prompts.forEach(({ label, key, color }) => {
      const text = result[key] || '';
      if (!text) return;
      h += `<div style="background:#0d0d20;border:1px solid ${color}40;border-radius:8px;padding:12px 14px;margin-bottom:10px;overflow:hidden">
        <div style="font-size:0.65rem;color:${color};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-weight:600">${label}</div>
        <div style="font-size:0.78rem;color:#d0d0e8;line-height:1.7;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap">${esc(text)}</div>
      </div>`;
    });
    return h;
  }

  if (agentId === 'flux') {
    const imgs = [
      { key:'source', label:'Source', url: result.source_url },
      { key:'A',      label:'Carte 1 révélée', url: result.image_A_url },
      { key:'B',      label:'Cartes 1+2', url: result.image_B_url },
      { key:'C',      label:'Toutes révélées', url: result.image_C_url },
    ];
    let h = `<div class="images-reveal">`;
    imgs.forEach(({ label, url }) => {
      if (!url) return;
      const displayUrl = url.replace('https://factorytiktok.duckdns.org', API);
      h += `<div class="img-box" onclick="openLightbox('${displayUrl}')">
        <img src="${displayUrl}" alt="${label}" loading="lazy">
        <div class="img-label">${label}</div>
      </div>`;
    });
    h += `</div>`;
    return h;
  }

  if (agentId === 'voice') {
    const audioUrl = (result.audio_url || '').replace('https://factorytiktok.duckdns.org', API);
    return `
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:10px;padding:16px;margin-bottom:12px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Audio généré</div>
        <audio controls style="width:100%;margin-bottom:10px" src="${audioUrl}"></audio>
        <div style="font-size:0.72rem;color:#7070a0">Durée : <strong style="color:#c084fc">${Math.round(result.audio_duration||0)}s</strong></div>
      </div>
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:10px;padding:14px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Script</div>
        <div style="font-size:0.78rem;color:#c0c0d0;line-height:1.7;font-style:italic">${esc(result.script||'')}</div>
      </div>`;
  }

  if (agentId === 'video') {
    const videoUrl = (result.video_url || '').replace('https://factorytiktok.duckdns.org', API);
    return `
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Vidéo finale</div>
        <video controls style="max-width:320px;width:100%;border-radius:8px" src="${videoUrl}"></video>
        <div style="font-size:0.72rem;color:#7070a0;margin-top:8px">
          Durée audio : <strong style="color:#c084fc">${Math.round(result.audio_duration||0)}s</strong> •
          Transitions : <strong style="color:#c084fc">${(result.transitions||[]).map(t=>t.toFixed(1)).join('s / ')}s</strong>
        </div>
      </div>`;
  }

  if (agentId === 'publish') {
    const pub = result.publish || {};
    const statusColor = pub.status === 'sent_to_inbox' ? '#4ade80' : '#f87171';
    const statusIcon = pub.status === 'sent_to_inbox' ? '✓' : '✗';
    return `
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Titre</div>
        <div style="font-size:0.9rem;font-weight:600;color:#c084fc">${esc(result.title||'')}</div>
      </div>
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Description</div>
        <div style="font-size:0.82rem;color:#d0d0e8;line-height:1.6">${esc(result.description||'')}</div>
      </div>
      <div style="background:#0d0d20;border:1px solid #2a2a4a;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Hashtags</div>
        <div style="font-size:0.8rem;color:#60a5fa">${esc(result.hashtags||'')}</div>
      </div>
      <div style="background:#0d0d20;border:1px solid ${statusColor}40;border-radius:10px;padding:14px">
        <div style="font-size:0.68rem;color:#a78bfa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Publication TikTok</div>
        <div style="font-size:0.85rem;color:${statusColor}">${statusIcon} ${esc(pub.message||pub.status||'')}</div>
        ${pub.publish_id ? `<div style="font-size:0.7rem;color:#6060a0;margin-top:4px">ID : ${esc(pub.publish_id)}</div>` : ''}
      </div>`;
  }
  return '';
}

async function runAgent(agentId, extraBody={}) {
  if (!currentJobId) return;
  const r = await fetch(`${BASE}/jobs/${currentJobId}/run/${agentId}`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(extraBody)
  });
  if (!r.ok) { const e=await r.json(); alert('Erreur: '+(e.detail||r.status)); return; }
  await refreshAndRender();
  startPoll();
}

async function runSeedreamStep(step) {
  await runAgent('flux', { step });
}

async function waitAgentDone(agentId, timeoutMs=360000) {
  const deadline = Date.now() + timeoutMs;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 3000));
    const job = await fetchJob(currentJobId);
    if (!job) return false;
    renderPipeline(job);
    if (currentAgent) renderDetail(currentAgent, job);
    const ag = job.agents?.[agentId];
    if (ag?.status === 'done') return true;
    if (ag?.status === 'error') return false;
  }
  return false;
}

async function runSeedreamChain() {
  if (!currentJobId) return;
  for (const step of ['A', 'B', 'C']) {
    const r = await fetch(`${BASE}/jobs/${currentJobId}/run/flux`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ step })
    });
    if (!r.ok) { const e=await r.json(); alert('Erreur step '+step+': '+(e.detail||r.status)); return; }
    await refreshAndRender();
    const ok = await waitAgentDone('flux');
    if (!ok) { alert('Seedream étape '+step+' échouée — arrêt.'); return; }
  }
}

async function runAll() {
  if (!currentJobId) return;
  await runAgent('content');
}

function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!currentJobId) return;
    const job = await fetchJob(currentJobId);
    if (!job) return;
    renderPipeline(job);
    // Ne pas re-render le detail si l'agent affiché est déjà done (évite de détruire le player audio)
    if (currentAgent) {
      const agSt = job.agents?.[currentAgent]?.status;
      if (agSt !== 'done') renderDetail(currentAgent, job);
    }
    await loadJobs();
    if (['done','error'].includes(job.status)) { clearInterval(pollTimer); pollTimer=null; }
  }, 2000);
}

async function refreshAndRender() {
  const job = await fetchJob(currentJobId);
  if (!job) return;
  renderPipeline(job);
  if (currentAgent) renderDetail(currentAgent, job);
  await loadJobs();
}

async function fetchJob(jobId) {
  try { const r=await fetch(`${BASE}/jobs/${jobId}`); return r.ok?await r.json():null; } catch { return null; }
}

// ─── Settings ────────────────────────────────────────────────────────────────

async function openSettings() {
  const r = await fetch(`${BASE}/settings`);
  const settings = await r.json();

  const sourcesR = await fetch(`${BASE}/sources`);
  const sourcesD = await sourcesR.json();
  const sources = sourcesD.sources || [];

  const arcanesR = await fetch(`${BASE}/arcanes`);
  const arcanes = await arcanesR.json();

  const thumbs = sources.map(s => {
    const url = s.url.replace('https://factorytiktok.duckdns.org', API);
    return `<div class="source-thumb">
      <img src="${url}" alt="${s.filename}" loading="lazy">
      <button class="source-delete" onclick="deleteSource('${s.filename}')" title="Supprimer">✕</button>
      <div class="source-name">${s.filename}</div>
    </div>`;
  }).join('');

  document.getElementById('drawer-body').innerHTML = `
    <div class="param-group">
      <div class="param-label">Photos sources (3 cartes face cachée)</div>
      <label class="upload-zone" id="upload-zone">
        <input type="file" id="upload-input" accept="image/jpeg,image/png" multiple onchange="uploadSources(this)">
        <div style="font-size:1.5rem;margin-bottom:8px">📁</div>
        <div style="font-size:0.82rem;color:#7070a0">Cliquez pour uploader des photos JPG/PNG</div>
        <div style="font-size:0.68rem;color:#4a4a70;margin-top:4px">Format 2/3 recommandé (portrait)</div>
      </label>
      ${sources.length > 0 ? `<div class="sources-grid">${thumbs}</div>
        <div style="font-size:0.7rem;color:#5a5a80;margin-top:6px">${sources.length} photo${sources.length>1?'s':''} disponible${sources.length>1?'s':''}</div>` :
        '<div style="font-size:0.72rem;color:#4a4a70">Aucune photo uploadée</div>'}
    </div>
    <div style="border-top:1px solid #1e1e3a;margin:16px 0"></div>
    <div class="param-group">
      <div class="param-label">Base des Arcanes Majeurs (${arcanes.length} cartes)</div>
      <div style="font-size:0.68rem;color:#5a5a80;margin-bottom:8px">Base de connaissances utilisée pour les tirages et la génération d'images</div>
      <div id="arcanes-list" style="max-height:500px;overflow-y:auto">
        ${arcanes.map(a => `
          <div style="background:#0d0d20;border:1px solid #1e1e3a;border-radius:6px;padding:10px 12px;margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-size:0.78rem;color:#c084fc;font-weight:bold">${a.numero} — ${a.nom}</span>
              <span style="font-size:0.65rem;color:#a78bfa;background:#1a1a3a;padding:2px 8px;border-radius:10px">${a.energie}</span>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:5px">
              <div style="flex:1;font-size:0.68rem"><span style="color:#4ade80">⬆</span> <span style="color:#8a8ab0">${a.endroit}</span></div>
              <div style="flex:1;font-size:0.68rem"><span style="color:#f87171">⬇</span> <span style="color:#8a8ab0">${a.inverse}</span></div>
            </div>
            <div style="font-size:0.68rem;color:#6a6a9a;font-style:italic;line-height:1.5">🎨 ${a.visuel}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="border-top:1px solid #1e1e3a;margin:16px 0"></div>
    <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:8px">💾 Sauvegarder</button>
    <div id="settings-status" style="margin-top:8px;font-size:0.78rem;color:#7070a0"></div>`;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

async function deleteSource(filename) {
  await fetch(`${BASE}/sources/${encodeURIComponent(filename)}`, { method: 'DELETE' });
  await openSettings();
}

async function uploadSources(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const statusEl = document.getElementById('settings-status');
  if (statusEl) { statusEl.textContent = `Upload de ${files.length} fichier(s)...`; statusEl.style.color = '#a855f7'; }
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    await fetch(`${BASE}/upload`, { method: 'POST', body: fd });
  }
  if (statusEl) { statusEl.textContent = `✓ ${files.length} fichier(s) uploadé(s)`; statusEl.style.color = '#10b981'; }
  await openSettings();
}

async function saveSettings() {
  const body = {
  };
  const r = await fetch(`${BASE}/settings`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const statusEl = document.getElementById('settings-status');
  if (r.ok) { statusEl.textContent = '✓ Sauvegardé'; statusEl.style.color = '#10b981'; }
  else { statusEl.textContent = '✗ Erreur'; statusEl.style.color = '#ef4444'; }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key==='Escape') { closeLightbox(); closeDrawer(); } });

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
